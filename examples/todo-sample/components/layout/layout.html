<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {{block "component-styles" .}}{{end}}
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-inner">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">Thunder <span class="logo-accent">TODO</span></span>
                </div>
            </div>
        </header>
        <main class="app-main">
            {{template "content" .}}
        </main>
        <footer class="app-footer">
            <p>Hecho con <strong>Thunder Framework</strong> en Go &mdash; {{year}}</p>
        </footer>
    </div>
</body>
</html>
