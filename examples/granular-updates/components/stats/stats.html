{{define "content"}}
<div class="stats-widget animate-fade-in">
    <div class="widget-header">
        <h2 class="widget-title">Project Stats</h2>
        <button class="btn btn-refresh"
                hx-post="/widgets/stats/refresh"
                hx-target="#stats-widget"
                hx-swap="innerHTML">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            Refresh Data
            <span class="refresh-count">{{.Refreshes}}</span>
        </button>
    </div>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon tasks-icon">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            </div>
            <div class="stat-value">{{.Stats.TasksDone}}<span class="stat-total">/{{.Stats.TasksTotal}}</span></div>
            <div class="stat-label">Tasks Completed</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon hours-icon">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div class="stat-value">{{printf "%.1f" .Stats.HoursWeek}}<span class="stat-total">h</span></div>
            <div class="stat-label">Hours This Week</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon team-icon">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <div class="stat-value">{{.Stats.TeamOnline}}<span class="stat-total">/{{.Stats.TeamTotal}}</span></div>
            <div class="stat-label">Team Online</div>
        </div>
    </div>
</div>
{{end}}
