<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Thunder Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1a1a1a; color: #e0e0e0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #2d2d2d; padding: 20px; border-right: 2px solid #3d3d3d; }
        .sidebar h2 { color: #f44336; border-bottom: 2px solid #3d3d3d; padding-bottom: 10px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-nav a { color: #aaa; text-decoration: none; padding: 10px; border-radius: 4px; }
        .sidebar-nav a:hover { background: #3d3d3d; color: white; }
        .sidebar-nav a.active { background: #f44336; color: white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; border-left: 5px solid #f44336; margin-bottom: 20px; }
        .btn-back { display: inline-block; margin-top: 20px; color: #f44336; text-decoration: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Thunder Admin ⚡</h2>
        <div class="sidebar-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/settings">Configuración</a>
            <hr style="border: 1px solid #3d3d3d; width: 100%;">
            <a href="/">Volver al Sitio</a>
        </div>
    </div>
    <div class="main-content">
        <div class="card">
            {{template "content" .}}
        </div>
    </div>
</body>
</html>
